<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>ARENASL</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <video id="feed" autoplay muted playsinline></video>
    <canvas id="landmarks"></canvas>
    <pre id="debug"></pre>
    <div id="message" class="message hidden" role="alert"></div>
    <div id="overlay">
      <div id="prompts"></div>
      <div id="clip-box">
        <video id="clip" autoplay loop muted playsinline></video>
        <canvas id="clip-landmarks"></canvas>
      </div>
      <div id="rope"><div id="rope-marker"></div></div>
      <div id="score">0</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
